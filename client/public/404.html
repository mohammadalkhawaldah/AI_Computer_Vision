<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var locationPath = window.location.pathname;
        var originPath = locationPath.split("/").slice(0, 1 + pathSegmentsToKeep).join("/");
        var routePath = locationPath.slice(originPath.length) || "/";
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        var redirectUrl = originPath + "/?p=" + encodeURIComponent(routePath + search) + hash;
        window.location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
